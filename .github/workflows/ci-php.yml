name: CI (PHP)

on:
  push:
    branches: [main, develop]
    paths: ['packages/php/**', '.github/workflows/ci-php.yml']
  pull_request:
    paths: ['packages/php/**', '.github/workflows/ci-php.yml']

defaults:
  run:
    working-directory: packages/php

jobs:
  # Single source runs natively on every supported PHP version.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer update --prefer-dist --no-progress
      - run: composer test

  # Static analysis once, on the newest version.
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer update --prefer-dist --no-progress
      - run: composer analyse

  # Coverage floor gate (REQUIREMENTS §4: tracked, no regression). Runs the unit
  # suite under PCOV and fails if line coverage drops below the floor. Freshen's
  # Redis driver is excluded from the denominator — it is covered by the separate
  # live-Redis integration lane (scripts/php-redis-it.sh), not this unit run.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
      - run: composer update --prefer-dist --no-progress
      - run: vendor/bin/phpunit --coverage-clover build/clover.xml
      - run: php ../../scripts/php-coverage-gate.php build/clover.xml 90
