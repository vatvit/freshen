name: CI (PHP)

on:
  push:
    branches: [main, develop]
    paths: ['packages/php/**', '.github/workflows/ci-php.yml']
  pull_request:
    paths: ['packages/php/**', '.github/workflows/ci-php.yml']

defaults:
  run:
    working-directory: packages/php

jobs:
  # Single source runs natively on every supported PHP version.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer update --prefer-dist --no-progress
      - run: composer test

  # Static analysis once, on the newest version.
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer update --prefer-dist --no-progress
      - run: composer analyse
