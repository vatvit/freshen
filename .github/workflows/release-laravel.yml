name: Release Laravel → Packagist mirror

# Triggered by a `laravel-vX.Y.Z` tag. Delegates to the shared reusable publish workflow
# (.github/workflows/publish-package.yml, FRSH-028), which injects the monorepo
# homepage/support metadata, publishes packages/laravel tags-only to the mirror, and syncs
# the mirror README. A copy of release-php.yml with different inputs.
#
# SETUP REQUIRED (one-time):
#   1. Create the mirror repo (default: vatvit/freshen-laravel). Keep its default branch a
#      composer.json-free placeholder (a README) so no `dev-*` version appears.
#   2. MIRROR_TOKEN (PAT with push access to the mirror) — shared with the other packages.
#   3. Register the mirror on Packagist as package vatvit/freshen-laravel.
#   4. Release by tagging: git tag laravel-v1.0.0-rc.1 && git push origin laravel-v1.0.0-rc.1

on:
  push:
    tags: ['laravel-v*']

jobs:
  publish:
    uses: ./.github/workflows/publish-package.yml
    with:
      package_dir: packages/laravel
      composer_name: vatvit/freshen-laravel
      mirror_repo: vatvit/freshen-laravel
    secrets:
      MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
